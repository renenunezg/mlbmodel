<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0b0f17"/>
  <!-- x-axis baseline -->
  <line x1="3" y1="25" x2="29" y2="25" stroke="#3b4252" stroke-width="1"/>
  <!-- Normal distribution bell curve -->
  <path
    d="M 3 25
       C 7 25, 9 24, 11 20
       C 13 14, 15 7, 16 7
       C 17 7, 19 14, 21 20
       C 23 24, 25 25, 29 25"
    fill="none"
    stroke="#22c55e"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Mean marker -->
  <line x1="16" y1="8" x2="16" y2="25" stroke="#22c55e" stroke-width="1" stroke-dasharray="1.5,1.5" opacity="0.5"/>
</svg>
