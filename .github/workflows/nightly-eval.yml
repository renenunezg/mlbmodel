name: Nightly Evaluation and Refresh

on:
  # Primary trigger: Supabase pg_cron (nightly-eval-dispatch) fires this via
  # repository_dispatch at 12:01 AM PT (07:01 UTC), bypassing GitHub's unreliable
  # scheduler. Same pg_cron + Vault PAT mechanism as refresh-lineups.
  repository_dispatch:
    types: [nightly-eval]
  schedule:
    # Backup only: once-daily safety net at 1:37 AM PT (08:37 UTC) in case the
    # pg_cron dispatch misses. Runs are idempotent and serialized by concurrency,
    # so a double-run with the dispatch is harmless.
    - cron: "37 8 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-eval
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Restore Statcast cache
        uses: actions/cache@v4
        with:
          path: cache
          key: statcast-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            statcast-${{ runner.os }}-

      - name: Restore posteriors
        uses: actions/cache@v4
        with:
          path: v2/bayesian/posteriors
          key: posteriors-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            posteriors-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r v2/requirements.txt && pip install -e .

      - name: Run evaluation on completed games
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python pipeline.py nightly

      - name: Score tomorrow's games with v2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python -m v2.pipeline.daily_run
