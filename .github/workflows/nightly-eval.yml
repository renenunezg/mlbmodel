name: Nightly Evaluation and Refresh

on:
  schedule:
    # 12 AM PDT / 11 PM PST (07:00 UTC) — "today" has rolled over so
    # predictions land on the correct new-day date. Evaluates yesterday's
    # results, then refreshes starters and reruns predictions for the new day.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-eval
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Enable IPv6 via Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Resolve Supabase host to IPv4
        run: |
          IPV4=$(dig +short A db.zgirspbdvzikzaeqytvf.supabase.co | head -1)
          echo "Resolved to $IPV4"
          echo "$IPV4 db.zgirspbdvzikzaeqytvf.supabase.co" | sudo tee -a /etc/hosts

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly eval and refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python pipeline.py nightly
