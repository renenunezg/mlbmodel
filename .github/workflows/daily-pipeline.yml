name: Daily MLB Pipeline

on:
  schedule:
    # Run at 9:00 AM ET (13:00 UTC) daily during MLB season
    - cron: "0 13 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Resolve Supabase host to IPv4
        run: |
          IPV4=$(dig +short A db.zgirspbdvzikzaeqytvf.supabase.co | head -1)
          echo "Resolved to $IPV4"
          echo "$IPV4 db.zgirspbdvzikzaeqytvf.supabase.co" | sudo tee -a /etc/hosts

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python pipeline.py
