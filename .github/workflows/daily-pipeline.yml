name: Daily MLB Pipeline

on:
  schedule:
    # Primary: 6:00 AM PST / 7:00 AM PDT (14:00 UTC) — before 9 AM games
    - cron: "0 14 * * *"
    # Backup 30 min later: GitHub's scheduled workflows can be skipped/delayed
    # under load. Pipeline is idempotent (all DB ops keyed on game_pk) so a
    # second run is safe. The concurrency group below prevents overlap.
    - cron: "30 14 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Enable IPv6 via Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Resolve Supabase host to IPv4
        run: |
          IPV4=$(dig +short A db.zgirspbdvzikzaeqytvf.supabase.co | head -1)
          echo "Resolved to $IPV4"
          echo "$IPV4 db.zgirspbdvzikzaeqytvf.supabase.co" | sudo tee -a /etc/hosts

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python pipeline.py

      - name: Verify pipeline output
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: "."
        run: python verify_pipeline.py
