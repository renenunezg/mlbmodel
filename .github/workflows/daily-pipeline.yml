name: Daily MLB Pipeline

on:
  workflow_dispatch:

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache Statcast parquet data
        uses: actions/cache@v4
        with:
          path: cache
          key: statcast-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            statcast-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PYTHONPATH: "."
        run: python pipeline.py

      - name: Verify pipeline output
        if: always()
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: "."
        run: python verify_pipeline.py
