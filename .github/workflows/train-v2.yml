name: Train v2 Models

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: train-v2
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Restore Statcast cache
        uses: actions/cache@v4
        with:
          path: cache
          key: statcast-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            statcast-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r v2/requirements.txt && pip install -e .

      - name: Refresh 2026 Statcast cache
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: "."
        run: python -m v2.data.build_cache --years 2024 2025 2026

      - name: Train v2 models
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: "."
        run: python -m v2.pipeline.train --mode full --archive

      - name: Save posteriors to cache
        uses: actions/cache@v4
        with:
          path: v2/bayesian/posteriors
          key: posteriors-${{ runner.os }}-${{ github.run_id }}
